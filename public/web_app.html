<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0000;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(200,0,0,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(120,0,0,0.15) 0%, transparent 50%);
    font-family: 'Rajdhani', sans-serif;
  }

  .calc {
    background: linear-gradient(160deg, #2a0505 0%, #1a0000 100%);
    border: 1px solid rgba(200,30,30,0.3);
    border-radius: 20px;
    padding: 24px;
    width: 320px;
    box-shadow:
      0 0 0 1px rgba(255,60,60,0.08),
      0 20px 60px rgba(0,0,0,0.7),
      0 0 40px rgba(180,0,0,0.15) inset;
  }

  /* Display */
  .display {
    background: #0d0000;
    border: 1px solid rgba(200,30,30,0.25);
    border-radius: 12px;
    padding: 16px 20px 12px;
    margin-bottom: 20px;
    text-align: right;
    position: relative;
    overflow: hidden;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,80,80,0.4), transparent);
  }

  .display .expr {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,100,100,0.45);
    min-height: 18px;
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .display .result {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.4rem;
    color: #ff4444;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.2;
    text-shadow: 0 0 20px rgba(255,60,60,0.4);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .display .result.small { font-size: 1.6rem; }

  /* Buttons grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 10px;
    height: 60px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.03em;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.1s;
  }

  button:active::after { background: rgba(255,255,255,0.08); }
  button:active { transform: scale(0.95); }

  /* Number buttons */
  .btn-num {
    background: linear-gradient(160deg, #3a0808, #280505);
    color: #ffcccc;
    border: 1px solid rgba(180,30,30,0.25);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 1px 0 rgba(255,80,80,0.1) inset;
  }
  .btn-num:hover { background: linear-gradient(160deg, #4a0a0a, #320606); border-color: rgba(220,50,50,0.4); color: #fff; }

  /* Operator buttons */
  .btn-op {
    background: linear-gradient(160deg, #7a0000, #5a0000);
    color: #fff;
    border: 1px solid rgba(255,60,60,0.3);
    box-shadow: 0 4px 12px rgba(120,0,0,0.4), 0 1px 0 rgba(255,100,100,0.15) inset;
    text-shadow: 0 0 8px rgba(255,100,100,0.5);
  }
  .btn-op:hover { background: linear-gradient(160deg, #960000, #700000); border-color: rgba(255,80,80,0.5); box-shadow: 0 4px 16px rgba(160,0,0,0.5), 0 0 12px rgba(255,60,60,0.2); }

  /* Equals */
  .btn-eq {
    background: linear-gradient(160deg, #cc0000, #990000);
    color: #fff;
    border: 1px solid rgba(255,80,80,0.4);
    box-shadow: 0 4px 20px rgba(180,0,0,0.5), 0 1px 0 rgba(255,120,120,0.2) inset;
    font-size: 1.4rem;
    text-shadow: 0 0 10px rgba(255,150,150,0.6);
    grid-column: span 2;
  }
  .btn-eq:hover { background: linear-gradient(160deg, #e60000, #b30000); box-shadow: 0 4px 24px rgba(220,0,0,0.6), 0 0 16px rgba(255,60,60,0.3); }

  /* Clear / special */
  .btn-clear {
    background: linear-gradient(160deg, #500000, #380000);
    color: #ff8080;
    border: 1px solid rgba(200,30,30,0.3);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    font-size: 0.95rem;
  }
  .btn-clear:hover { background: linear-gradient(160deg, #660000, #4a0000); color: #ffaaaa; }

  .btn-zero { grid-column: span 2; }

  /* Top label */
  .label {
    text-align: center;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: rgba(255,60,60,0.3);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="calc">
  <div class="label">calculator</div>

  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="grid">
    <button class="btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-clear" onclick="toggleSign()">+/−</button>
    <button class="btn-clear" onclick="percent()">%</button>
    <button class="btn-op"    onclick="setOp('/')">÷</button>

    <button class="btn-num" onclick="input('7')">7</button>
    <button class="btn-num" onclick="input('8')">8</button>
    <button class="btn-num" onclick="input('9')">9</button>
    <button class="btn-op"  onclick="setOp('*')">×</button>

    <button class="btn-num" onclick="input('4')">4</button>
    <button class="btn-num" onclick="input('5')">5</button>
    <button class="btn-num" onclick="input('6')">6</button>
    <button class="btn-op"  onclick="setOp('-')">−</button>

    <button class="btn-num" onclick="input('1')">1</button>
    <button class="btn-num" onclick="input('2')">2</button>
    <button class="btn-num" onclick="input('3')">3</button>
    <button class="btn-op"  onclick="setOp('+')">+</button>

    <button class="btn-num btn-zero" onclick="input('0')">0</button>
    <button class="btn-num" onclick="inputDot()">.</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let current = '0';
  let previous = '';
  let operator = null;
  let resetNext = false;

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expr');

  function updateDisplay() {
    resultEl.textContent = current;
    resultEl.className = 'result' + (current.length > 9 ? ' small' : '');
  }

  function input(val) {
    if (resetNext) { current = val; resetNext = false; }
    else current = current === '0' ? val : current + val;
    if (current.length > 12) current = current.slice(0, 12);
    updateDisplay();
  }

  function inputDot() {
    if (resetNext) { current = '0.'; resetNext = false; updateDisplay(); return; }
    if (!current.includes('.')) { current += '.'; updateDisplay(); }
  }

  function setOp(op) {
    if (operator && !resetNext) calculate(true);
    previous = current;
    operator = op;
    resetNext = true;
    const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[op];
    exprEl.textContent = previous + ' ' + sym;
  }

  function calculate(silent = false) {
    if (!operator || !previous) return;
    const a = parseFloat(previous), b = parseFloat(current);
    let res;
    switch(operator) {
      case '+': res = a + b; break;
      case '-': res = a - b; break;
      case '*': res = a * b; break;
      case '/': res = b !== 0 ? a / b : 'Error'; break;
    }
    const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[operator];
    if (!silent) exprEl.textContent = previous + ' ' + sym + ' ' + current + ' =';
    current = res === 'Error' ? 'Error' : parseFloat(res.toFixed(10)).toString();
    if (!silent) { operator = null; previous = ''; }
    resetNext = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; previous = ''; operator = null; resetNext = false;
    exprEl.textContent = ''; updateDisplay();
  }

  function toggleSign() {
    if (current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    current = (parseFloat(current) / 100).toString();
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
